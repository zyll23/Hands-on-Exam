<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Café</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff0f5;
}

header{
  background:#ff69b4;
  padding:20px;
  text-align:center;
  color:white;
}

nav a{
  margin:0 10px;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.hero{
  padding:60px 20px;
  text-align:center;
}

.hero h1{
  color:#d63384;
  font-size:40px;
}

.btn{
  background:#ff69b4;
  padding:10px 20px;
  color:white;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.section{
  padding:40px 20px;
  text-align:center;
}

.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

footer{
  text-align:center;
  padding:20px;
  background:#ff69b4;
  color:white;
}

@media(max-width:600px){
  .hero h1{font-size:30px;}
}
</style>
</head>

<body>

<header>
  <h2>Pink Café</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Sweet vibes, sweet food 💕</h1>
  <p>Your cozy girly café experience</p>
  <button class="btn">Order Now</button>
</section>

<section class="section">
  <h2>Best Sellers</h2>
  <div class="menu">

    <div class="card">
      <h3>Strawberry Cake</h3>
      <p>Soft & creamy pink delight</p>
    </div>

    <div class="card">
      <h3>Iced Matcha</h3>
      <p>Sweet + aesthetic drink</p>
    </div>

    <div class="card">
      <h3>Pink Pasta</h3>
      <p>Creamy rose sauce pasta</p>
    </div>

  </div>
</section>

<footer>
  © 2026 Pink Café
</footer>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Shop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff0f6;
}

header{
  background:#ff4d88;
  color:white;
  padding:20px;
  text-align:center;
}

.hero{
  text-align:center;
  padding:50px 20px;
}

.hero h1{
  font-size:40px;
  color:#c2185b;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
  text-align:center;
}

.card button{
  background:#ff4d88;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:20px;
  background:#ff4d88;
  color:white;
}

@media(max-width:600px){
  .hero h1{font-size:28px;}
}
</style>
</head>

<body>

<header>
  <h2>Sweet Shop 💕</h2>
</header>

<section class="hero">
  <h1>Shop cute. Shop pink. Shop happy.</h1>
</section>

<section class="products">

  <div class="card">
    <h3>Pink Hoodie</h3>
    <p>₱299</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <h3>Cute Bag</h3>
    <p>₱199</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <h3>Phone Case</h3>
    <p>₱99</p>
    <button>Add to Cart</button>
  </div>

</section>

<footer>
  © 2026 Sweet Shop
</footer>

</body>
</html>
